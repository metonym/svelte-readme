name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun ci

      - name: Run Biome
        run: bunx biome ci --error-on-warnings

      - name: Run unit tests
        run: bun test

      - name: Build package
        run: bun run build

      - name: Verify against Svelte 5
        run: bun run verify

      - name: Link package
        run: bun link

      - name: Install test fixture dependencies
        run: bun ci
        working-directory: test

      - name: Link package into test fixture
        run: bun link svelte-readme
        working-directory: test

      - name: Build demo
        run: bun run build
        working-directory: test
